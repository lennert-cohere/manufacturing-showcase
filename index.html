  <!-- Controls -->
  <div class="top-controls">
    <div class="scenario-dropdown" id="scenario-dropdown">
      <button class="ctrl-btn" id="scenario-btn" title="Choose a live incident scenario">Live Scenario ▾</button>
      <div class="scenario-menu" id="scenario-menu"></div>
    </div>
    <button class="ctrl-btn" id="tour-btn" title="Auto-pilot guided tour">Tour</button>
    <button class="ctrl-btn" id="demo-loop-btn" title="Loop through all scenarios (trade-show mode)">Demo Loop</button>
    <button class="ctrl-btn" id="fs-btn" title="Toggle fullscreen (F)">Fullscreen</button>
  </div>

  <!-- Intro text sequence -->
  <div id="intro-text" class="intro-text">
    <div class="intro-line" id="intro-line-1">Your factory. Every system.</div>
    <div class="intro-line" id="intro-line-2">Connected by AI agents.</div>
    <div class="intro-line" id="intro-line-3">Orchestrated by North.</div>
  </div>

  <!-- Tour caption subtitle -->
  <div id="tour-caption" class="tour-caption hidden"></div>

  <!-- KPI Summary overlay (shown after scenario ends) -->
  <div id="kpi-summary" class="kpi-summary hidden">
    <div class="kpi-summary-card">
      <div class="kpi-summary-title">Impact Summary</div>
      <div class="kpi-summary-rows" id="kpi-summary-rows"></div>
    </div>
  </div>

  <div id="hint-text" class="hidden">Click a platform to explore · 0 for North · 1-5 for areas · Esc to return · F fullscreen</div>
  <div id="tour-dots" class="hidden"></div>
  <div id="incident-toast">
    <div class="toast-progress"><div class="toast-progress-fill" id="toast-progress-fill"></div></div>
    <div class="toast-header">
      <div class="toast-phase"></div>
      <div class="toast-step"></div>
    </div>
    <div class="toast-role"></div>
    <div class="toast-title"></div>
    <div class="toast-divider"></div>
    <div class="toast-text"></div>
  </div>

  <!-- Scenario Briefing Modal -->
  <div id="scenario-modal" class="scenario-modal">
    <div class="scenario-modal-card">
      <div class="scenario-modal-eyebrow">Live Scenario</div>
      <div class="scenario-modal-name" id="modal-name"></div>
      <div class="scenario-modal-divider"></div>
      <div class="scenario-modal-desc" id="modal-desc"></div>
      <div class="scenario-modal-steps" id="modal-steps"></div>
      <div class="scenario-modal-actions">
        <button class="scenario-modal-btn abort" id="modal-abort">Cancel</button>
        <button class="scenario-modal-btn run" id="modal-run">Run Scenario</button>
      </div>
    </div>
  </div>

  <!-- Zoom-in action buttons -->
  <div class="zoom-actions hidden" id="zoom-actions">
    <button class="zoom-btn exit" id="exit-btn">Exit</button>
    <button class="zoom-btn details" id="detail-trigger">View Details</button>
  </div>

  <!-- Detail Modal -->
  <div id="detail-modal" class="detail-modal">
    <div class="detail-modal-card">
      <button class="detail-modal-close" id="detail-close-btn">✕</button>
      <div id="panel-content" class="detail-modal-body"></div>
    </div>
  </div>

  <div id="scene-container" class="intro-blur"></div>
  <script type="module" src="scene.js"></script>
</body>
</html>
